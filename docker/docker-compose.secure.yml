version: "3.8"

services:
  openclaw:
    image: openclaw/openclaw:latest
    container_name: openclaw
    user: "1000:1000"
    read_only: true
    privileged: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:18789:18789"
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
    volumes:
      - openclaw_data:/app/data
      - openclaw_config:/app/config
      - openclaw_logs:/app/logs
    environment:
      - OPENCLAW_PORT=18789
      - OPENCLAW_HOST=0.0.0.0
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
      nproc:
        soft: 256
        hard: 512
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:18789/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "openclaw"
    restart: unless-stopped
    networks:
      - openclaw_net

volumes:
  openclaw_data:
    driver: local
  openclaw_config:
    driver: local
  openclaw_logs:
    driver: local

networks:
  openclaw_net:
    driver: bridge
    internal: false